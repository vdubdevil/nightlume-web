<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightlume | System Access</title>
    <link rel="stylesheet" href="../CSS/style_base.css">
    <link rel="stylesheet" href="../CSS/style_signup.css">
</head>

<body class="auth-page">
    <div class="nav-container">
        <div class="logo neon-text" id="logo-neon">Nightlume</div>
        <div class="nav-right">
            <a href="index.html" class="nav-link">Return to base</a>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card" id="auth-card">
            <div class="badge">Node: 0x77AF</div>
            <div class="auth-header">
                <h1 class="neon-text" id="auth-title">Login</h1>
            </div>

            <form id="auth-form">
                <div class="form-content">
                    <div class="input-group">
                        <label>User Identity</label>
                        <input type="text" name="username" class="input-field" placeholder="ID_LOCAL_USER" required>
                    </div>

                    <div id="email-group" class="input-group">
                        <label>Secure Mail</label>
                        <input type="email" name="email" class="input-field" placeholder="proxy@nightlume.io">
                    </div>

                    <div class="input-group">
                        <label>Encryption Key</label>
                        <input type="password" name="password" class="input-field" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="action-btn submit-btn" id="auth-submit">
                        Authorize
                        <svg class="btn-icon btn-icon-arrow" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2.5" fill="none">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </div>
            </form>

            <div class="auth-footer" id="footer-text">
                <span>New here? <b onclick="toggleMode()">REGISTER</b></span>
            </div>

            <div class="sys-info">
                Latency: 14ms // Auth_SRV: Online // <span class="pulse-text">Scanning...</span>
            </div>
        </div>
    </div>
    <script src="../script.js"></script>
    <div class="modal-overlay" id="error-modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">SYSTEM ACCESS</div>
            <div id="error-modal-text">ACCESS DENIED</div>
            <div class="modal-buttons" style="margin-top:30px;">
                <button class="modal-btn" id="error-modal-close">ACKNOWLEDGE</button>
            </div>
        </div>
    </div>
</body>

</html>
